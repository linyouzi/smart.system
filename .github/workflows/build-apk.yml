name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "android/**"
      - "public/**"
      - "capacitor.config.json"
      - "package.json"
      - "package-lock.json"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Copy to downloads folder
        run: |
          mkdir -p public/downloads
          cp android/app/build/outputs/apk/debug/app-debug.apk public/downloads/smart-boarding.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: smart-boarding-apk
          path: public/downloads/smart-boarding.apk
          retention-days: 90
